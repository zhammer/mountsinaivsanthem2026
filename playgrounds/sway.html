<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sway Animation Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #ccc; font-family: system-ui, sans-serif; display: flex; height: 100vh; }

  .controls {
    width: 320px;
    padding: 20px;
    border-right: 1px solid #333;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .controls h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .controls h3 { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 10px; border-top: 1px solid #333; padding-top: 12px; }
  .control-group { margin-bottom: 14px; }
  .control-group label { display: block; font-size: 13px; margin-bottom: 6px; color: #aaa; }
  .control-group .value { color: #ffd700; font-family: monospace; font-size: 13px; }
  .control-group input[type="range"] { width: 100%; accent-color: #ffd700; }

  .right-side { flex: 1; display: flex; flex-direction: column; }

  .preview {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .robot-scene { display: flex; align-items: center; justify-content: center; }

  .robot-wrap {
    position: relative;
    display: flex;
    align-items: center;
    will-change: transform;
  }
  .robot-wrap.red { margin-right: -80px; z-index: 0; }
  .robot-wrap.blue { margin-left: -80px; z-index: 0; }

  .robot-parts {
    position: relative;
    height: 70vh;
    aspect-ratio: 1;
  }
  .blue .robot-parts { transform: scaleX(-1); }

  .robot-part {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    will-change: transform;
  }
  .back-part { transform: translate(10px, -6px); }

  .shoulder-pivot, .elbow-pivot,
  .back-shoulder-pivot, .back-elbow-pivot {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .shoulder-pivot { transform-origin: 52.1% 23.2%; }
  .elbow-pivot { transform-origin: 53.9% 39.4%; }
  .back-shoulder-pivot { transform-origin: 52.1% 23.2%; transform: translate(10px, -6px); }
  .back-elbow-pivot { transform-origin: 53.9% 39.4%; }

  .prompt-area {
    border-top: 1px solid #333;
    padding: 16px 20px;
    background: #1a1a1a;
    position: relative;
  }
  .prompt-area pre {
    font-family: monospace; font-size: 12px; line-height: 1.5;
    color: #ccc; white-space: pre-wrap; margin: 0; padding-right: 80px;
  }
  .copy-btn {
    position: absolute; top: 12px; right: 16px;
    background: #333; border: 1px solid #555; color: #ccc;
    padding: 4px 12px; cursor: pointer; font-size: 12px; font-family: monospace;
  }
  .copy-btn:hover { border-color: #ffd700; color: #ffd700; }
  .pin-btn {
    background: #222; border: 1px solid #444; color: #ccc; padding: 6px 12px;
    font-size: 12px; cursor: pointer; font-family: monospace;
  }
  .pin-btn:hover { border-color: #ffd700; color: #ffd700; }
</style>
</head>
<body>

<div class="controls">
  <h2>Sway Animation</h2>

  <h3>Body Sway</h3>
  <div class="control-group">
    <label>Sway X (px): <span class="value" id="swayX-val">12</span></label>
    <input type="range" id="swayX" min="0" max="30" value="12" step="1" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Bob Y (px): <span class="value" id="bobY-val">7</span></label>
    <input type="range" id="bobY" min="0" max="20" value="7" step="1" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Cycle (s): <span class="value" id="cycle-val">4</span></label>
    <input type="range" id="cycle" min="1" max="8" value="4" step="0.5" oninput="updateAll()">
  </div>

  <h3>Front Arm</h3>
  <div class="control-group">
    <label>Rotation (°): <span class="value" id="armSway-val">1</span></label>
    <input type="range" id="armSway" min="0" max="10" value="1" step="0.5" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Shift X (px): <span class="value" id="frontShift-val">3</span></label>
    <input type="range" id="frontShift" min="0" max="15" value="3" step="0.5" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Elbow rotation mult: <span class="value" id="frontElbowMult-val">0.5</span></label>
    <input type="range" id="frontElbowMult" min="0" max="2" value="0.5" step="0.1" oninput="updateAll()">
  </div>

  <h3>Back Arm</h3>
  <div class="control-group">
    <label>Rotation mult: <span class="value" id="backRotMult-val">0.6</span></label>
    <input type="range" id="backRotMult" min="0" max="3" value="0.6" step="0.1" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Shift X (px): <span class="value" id="backShift-val">3</span></label>
    <input type="range" id="backShift" min="0" max="15" value="3" step="0.5" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Elbow rotation mult: <span class="value" id="backElbowMult-val">0.3</span></label>
    <input type="range" id="backElbowMult" min="0" max="2" value="0.3" step="0.1" oninput="updateAll()">
  </div>

  <h3>Rest Angles</h3>
  <div class="control-group">
    <label>Shoulder: <span class="value" id="restShoulder-val">27°</span></label>
    <input type="range" id="restShoulder" min="0" max="60" value="27" step="1" oninput="updateAll()">
  </div>
  <div class="control-group">
    <label>Elbow: <span class="value" id="restElbow-val">21°</span></label>
    <input type="range" id="restElbow" min="-30" max="45" value="21" step="1" oninput="updateAll()">
  </div>

  <h3>Pin Position</h3>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <button class="pin-btn" onclick="setPin('forward')">Pin Forward</button>
    <button class="pin-btn" onclick="setPin('back')">Pin Back</button>
    <button class="pin-btn" onclick="setPin(null)">Animate</button>
  </div>
</div>

<div class="right-side">
  <div class="preview">
    <div class="robot-scene">
      <div class="robot-wrap red" id="red-wrap">
        <div class="robot-parts">
          <div class="back-shoulder-pivot" id="red-back-shoulder">
            <img class="robot-part" src="../public/sprites/robot_forearm_back_red.png">
            <div class="back-elbow-pivot" id="red-back-elbow">
              <img class="robot-part" src="../public/sprites/robot_upper_arm_back_red.png">
            </div>
          </div>
          <img class="robot-part back-part" src="../public/sprites/robot_leg_back_red.png">
          <img class="robot-part" src="../public/sprites/robot_head_red.png">
          <img class="robot-part" src="../public/sprites/robot_torso_red.png">
          <img class="robot-part" src="../public/sprites/robot_leg_front_red.png">
          <div class="shoulder-pivot" id="red-shoulder">
            <div class="elbow-pivot" id="red-elbow">
              <img class="robot-part" src="../public/sprites/robot_upper_arm_front_red.png">
            </div>
            <img class="robot-part" src="../public/sprites/robot_forearm_front_red.png">
          </div>
        </div>
      </div>

      <div class="robot-wrap blue" id="blue-wrap">
        <div class="robot-parts">
          <div class="back-shoulder-pivot" id="blue-back-shoulder">
            <img class="robot-part" src="../public/sprites/robot_forearm_back_blue.png">
            <div class="back-elbow-pivot" id="blue-back-elbow">
              <img class="robot-part" src="../public/sprites/robot_upper_arm_back_blue.png">
            </div>
          </div>
          <img class="robot-part back-part" src="../public/sprites/robot_leg_back_blue.png">
          <img class="robot-part" src="../public/sprites/robot_head_blue.png">
          <img class="robot-part" src="../public/sprites/robot_torso_blue.png">
          <img class="robot-part" src="../public/sprites/robot_leg_front_blue.png">
          <div class="shoulder-pivot" id="blue-shoulder">
            <div class="elbow-pivot" id="blue-elbow">
              <img class="robot-part" src="../public/sprites/robot_upper_arm_front_blue.png">
            </div>
            <img class="robot-part" src="../public/sprites/robot_forearm_front_blue.png">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="prompt-area">
    <pre id="prompt"></pre>
    <button class="copy-btn" onclick="copyPrompt()">Copy</button>
  </div>
</div>

<script>
const S = {
  swayX: 12, bobY: 7, cycle: 4,
  armSway: 1, frontShift: 3, frontElbowMult: 0.5,
  backRotMult: 0.6, backShift: 3, backElbowMult: 0.3,
  restShoulder: 27, restElbow: 21,
};

const fields = [
  'swayX','bobY','cycle',
  'armSway','frontShift','frontElbowMult',
  'backRotMult','backShift','backElbowMult',
  'restShoulder','restElbow',
];

function updateAll() {
  fields.forEach(f => {
    S[f] = +document.getElementById(f).value;
    const suffix = (f === 'restShoulder' || f === 'restElbow') ? '°' : '';
    document.getElementById(f + '-val').textContent = S[f] + suffix;
  });
  updatePrompt();
}

function updatePrompt() {
  document.getElementById('prompt').textContent =
`// sway.ts constants
const SWAY_X = ${S.swayX};
const BOB_Y = ${S.bobY};
const CYCLE = ${S.cycle};
const ARM_SWAY = ${S.armSway};
const ARM_SHIFT = ${S.frontShift};
const REST_SHOULDER = ${S.restShoulder};
const REST_ELBOW = ${S.restElbow};

// Front arm: shiftX ${S.frontShift}px, rotation ${S.armSway}°, elbow mult ${S.frontElbowMult}
// Back arm: shiftX ${S.backShift}px, rotation mult ${S.backRotMult}, elbow mult ${S.backElbowMult}`;
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('prompt').textContent);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

// --- Sway engine ---
const PAUSE_FRAC = 0.05;
const BOB_SHAPE = 2;

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

function swayPos(t) {
  const halfPause = PAUSE_FRAC;
  const moveTime = 1 - halfPause;
  const half = t < 0.5 ? 0 : 1;
  const ht = half === 0 ? t * 2 : (t - 0.5) * 2;

  let moveT;
  if (ht < halfPause / 2) moveT = 0;
  else if (ht > 1 - halfPause / 2) moveT = 1;
  else moveT = (ht - halfPause / 2) / moveTime;

  const easedT = easeInOut(moveT);
  const x = half === 0
    ? -S.swayX + easedT * 2 * S.swayX
    : S.swayX - easedT * 2 * S.swayX;
  const y = -S.bobY * Math.pow(Math.sin(moveT * Math.PI), BOB_SHAPE);
  return { x, y };
}

function updateArms(wrap, xNorm) {
  const frontShift = xNorm * S.frontShift;
  const backShift = xNorm * S.backShift;

  const fs = wrap.querySelector('.shoulder-pivot');
  const fe = wrap.querySelector('.elbow-pivot');
  if (fs) fs.style.transform = `translateX(${frontShift}px) rotate(${S.restShoulder + xNorm * S.armSway}deg)`;
  if (fe) fe.style.transform = `rotate(${S.restElbow + xNorm * S.armSway * S.frontElbowMult}deg)`;

  const bs = wrap.querySelector('.back-shoulder-pivot');
  const be = wrap.querySelector('.back-elbow-pivot');
  if (bs) bs.style.transform = `translate(${10 - backShift}px, -6px) rotate(${S.restShoulder - xNorm * S.armSway * S.backRotMult}deg)`;
  if (be) be.style.transform = `rotate(${S.restElbow - xNorm * S.armSway * S.backElbowMult}deg)`;
}

const blueWrap = document.getElementById('blue-wrap');
const redWrap = document.getElementById('red-wrap');
let start = null;
let pinned = null; // null, 'forward', or 'back'

function setPin(val) { pinned = val; }

function tick(timestamp) {
  if (!start) start = timestamp;

  if (pinned) {
    // xNorm: 1 = forward (toward opponent), -1 = back
    const xNorm = pinned === 'forward' ? -1 : 1;
    const x = pinned === 'forward' ? S.swayX : -S.swayX;
    blueWrap.style.transform = `scaleX(-1) translate(${x}px, 0px)`;
    redWrap.style.transform = `scaleX(-1) translate(${-x}px, 0px)`;
    updateArms(blueWrap, xNorm);
    updateArms(redWrap, xNorm);
    start = null;
    requestAnimationFrame(tick);
    return;
  }

  const elapsed = (timestamp - start) / 1000;
  const desync = S.cycle / 2;

  const tBlue = (elapsed % S.cycle) / S.cycle;
  const posBlue = swayPos(tBlue);
  blueWrap.style.transform = `scaleX(-1) translate(${posBlue.x}px, ${posBlue.y}px)`;
  updateArms(blueWrap, posBlue.x / S.swayX);

  const tRed = ((elapsed + desync) % S.cycle) / S.cycle;
  const posRed = swayPos(tRed);
  redWrap.style.transform = `scaleX(-1) translate(${posRed.x}px, ${posRed.y}px)`;
  updateArms(redWrap, -posRed.x / S.swayX);

  requestAnimationFrame(tick);
}

updateAll();
requestAnimationFrame(tick);
</script>
</body>
</html>
