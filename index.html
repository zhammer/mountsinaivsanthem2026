<!DOCTYPE html>
<html lang="en">
<head>

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root {
    width: 100%;
    min-height: 100%;
    background: #000;
  }
  .arena {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .robot-wrap {
    position: absolute;
    display: flex;
    align-items: center;
    will-change: transform;
  }
  .robot-wrap.red { right: 50%; margin-right: -160px; z-index: 0; }
  .robot-wrap.blue { left: 50%; margin-left: -160px; z-index: 0; }
  .robot-wrap.punching-wrap { z-index: 1; }
  .robot-parts {
    position: relative;
    height: max(95vh, 700px);
    aspect-ratio: 1;
  }
  .blue .robot-parts {
    transform: scaleX(-1);
  }
  .robot-part {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    will-change: transform;
  }
  .back-part {
    transform: translate(10px, -6px);
  }
  .blue .back-part {
    transform: translate(10px, -6px);
  }
  /* Punch pivot joints */
  .shoulder-pivot, .elbow-pivot {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .shoulder-pivot {
    transform-origin: 52.1% 23.2%;
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .elbow-pivot {
    transform-origin: 53.9% 39.4%;
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .punching .shoulder-pivot {
    transform: rotate(90deg);
    transition: transform 0.21s ease-out;
  }
  .punching .elbow-pivot {
    transform: rotate(-63deg);
    transition: transform 0.21s ease-out;
  }
  .holding .shoulder-pivot, .critHolding .shoulder-pivot {
    transform: rotate(90deg);
    transition: none;
  }
  .holding .elbow-pivot, .critHolding .elbow-pivot {
    transform: rotate(-63deg);
    transition: none;
  }
  .retracting .shoulder-pivot {
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .retracting .elbow-pivot {
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  /* Crit: slower fist retract to match head */
  .crit-retracting .shoulder-pivot {
    transform: rotate(0deg);
    transition: transform 0.4s ease-in;
  }
  .crit-retracting .elbow-pivot {
    transform: rotate(0deg);
    transition: transform 0.4s ease-in;
  }
  /* Head hit reaction — starts at holding (after fist lands) */
  .head {
    transition: transform 0.15s ease-in;
  }
  .hit-punching .head {
    transform: translateY(0);
  }
  .hit-holding .head {
    transform: translateY(-3%);
    transition: transform 0.1s ease-out 0.02s;
  }
  .hit-retracting .head {
    transform: translateY(0);
    transition: transform 0.2s ease-in;
  }
  .hit-crit.hit-retracting .head {
    transform: translateY(0);
    transition: transform 0.4s ease-in;
  }
  /* Crit head reaction — staccato ratchet upward, then smooth return */
  @keyframes crit-head-bob {
    0%   { transform: translateY(0); }
    8%   { transform: translateY(-2%); }
    14%  { transform: translateY(-1%); }
    22%  { transform: translateY(-4%); }
    28%  { transform: translateY(-3%); }
    36%  { transform: translateY(-6%); }
    42%  { transform: translateY(-5%); }
    50%  { transform: translateY(-8%); }
    56%  { transform: translateY(-7%); }
    64%  { transform: translateY(-10%); }
    100% { transform: translateY(-10%); }
  }
  .hit-crit.hit-holding .head {
    animation: crit-head-bob 0.8s ease-out forwards;
  }
  .hit-crit.hit-critHolding .head {
    transform: translateY(-10%);
    transition: none;
  }
  @keyframes pulse-orange {
    0%, 100% { opacity: 1; text-shadow: 0 0 16px rgba(255,102,0,0.5), 0 0 40px rgba(255,102,0,0.15); }
    50% { opacity: 0.6; text-shadow: 0 0 8px rgba(255,102,0,0.3), 0 0 20px rgba(255,102,0,0.1); }
  }
  /* Boxing Match Title Card */
  .title-card {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 60px 16px;
    pointer-events: none;
  }
  .title-card .fighter {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .title-card .fighter-logo {
    width: auto;
    height: 46px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.25));
  }
  .day-counter {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 0;
    font-family: Impact, 'Arial Black', Haettenschweiler, sans-serif;
    font-size: 48px;
    color: #ff6600;
    text-align: center;
    line-height: 1;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 16px rgba(255,102,0,0.5), 0 0 40px rgba(255,102,0,0.15), 0 2px 4px rgba(0,0,0,0.9);
    border: 4px solid #ff6600;
    animation: pulse-orange 2s ease-in-out infinite;
    padding: 8px 20px;
  }
  .what-is-this {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    color: #ccc;
    cursor: pointer;
    pointer-events: auto;
    text-decoration: underline;
  }
  .what-is-this:hover {
    color: #fff;
  }
  .title-card .fighter-name {
    font-family: Impact, 'Arial Black', Haettenschweiler, sans-serif;
    font-size: 38px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    line-height: 1;
  }
  .title-card .fighter-name {
    color: #ffd700;
    text-shadow: 0 0 12px rgba(255,215,0,0.5), 0 0 30px rgba(255,215,0,0.2);
  }
  /* Testimonials — 8-bit speech bubbles */
  .testimonials {
    max-width: 700px;
    margin: -60px auto 0;
    position: relative;
    z-index: 5;
    padding: 0 20px 40px;
  }
  .testimonial-card {
    position: relative;
    background: #fff;
    color: #000;
    padding: 14px 18px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .quote-mark {
    color: #999;
  }
  .testimonial-card p {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.5;
    text-align: left;
    margin: 0;
    white-space: pre-line;
    color: #000;
    font-weight: bold;
  }
  /* Info overlay — dark themed */
  .info-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    cursor: pointer;
    overflow-y: auto;
    padding: 40px 0;
  }
  .info-card {
    position: relative;
    background: #000;
    color: #ccc;
    padding: 32px 36px;
    max-width: 620px;
    width: 90%;
    cursor: default;
    flex-shrink: 0;
  }
  .info-card p {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.7;
    text-align: left;
    margin: 0 0 16px;
    color: #ccc;
  }
  .info-card p:last-of-type {
    margin-bottom: 0;
  }
  .info-card a {
    color: #ffd700;
  }
  .info-card a:hover {
    color: #ffe755;
  }
  .info-card a.link-red {
    color: #e6007e;
  }
  .info-card a.link-red:hover {
    color: #ff44a0;
  }
  .info-card a.link-blue {
    color: #144be5;
  }
  .info-card a.link-blue:hover {
    color: #4477ff;
  }
  .info-actions {
    display: flex;
    gap: 16px;
    margin-top: 24px;
    justify-content: center;
  }
  .info-action {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #ffd700;
    cursor: pointer;
    text-decoration: none;
    background: none;
    border: none;
    padding: 0;
  }
  .info-action:hover {
    color: #ffe755;
  }
  .info-action-text {
    text-decoration: underline;
  }
  .copied-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 200;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    background: rgba(0, 0, 0, 0.85);
    padding: 16px 32px;
    pointer-events: none;
  }
  .info-credit {
    margin-top: 0 !important;
    font-size: 11px !important;
    color: #666 !important;
  }
  .info-actions + .info-credit {
    margin-top: 24px !important;
  }
  .info-credit a {
    color: #666;
  }
  .info-credit a:hover {
    color: #999;
  }
  .info-close {
    position: absolute;
    top: 8px;
    right: 12px;
    background: none;
    border: none;
    outline: none;
    font-size: 20px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    color: #888;
    padding: 4px 8px;
  }
  .info-close:hover {
    color: #fff;
  }
  /* Testimonial popover */
  .popover-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    cursor: pointer;
    overflow-y: auto;
    padding: 40px 0;
  }
  .popover-card {
    position: relative;
    background: #fff;
    color: #000;
    padding: 24px 28px;
    max-width: 560px;
    width: 90%;
    cursor: default;
  }
  .popover-card p {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.6;
    text-align: left;
    margin: 0;
    white-space: pre-line;
    color: #000;
    font-weight: bold;
  }
  .popover-close {
    position: absolute;
    top: 8px;
    right: 12px;
    background: none;
    border: none;
    outline: none;
    font-size: 20px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    color: #000;
    padding: 4px 8px;
  }
  .popover-close:hover {
    color: #999;
  }
  /* Short viewport: anchor robots from top, scale down header */
  @media (max-height: 750px) {
    .arena {
      align-items: flex-start;
    }
    .robot-wrap {
      margin-top: 40px;
    }
    .robot-wrap.red { margin-right: -152px; }
    .robot-wrap.blue { margin-left: -152px; }
    .day-counter {
      font-size: 32px;
      padding: 4px 14px;
    }
    .what-is-this {
      top: 72px;
    }
    .title-card {
      padding: 10px 60px 8px;
    }
    .title-card .fighter-name {
      font-size: 28px;
    }
    .title-card .fighter-logo {
      width: 36px;
      height: 36px;
    }
  }
  /* Tablet and below */
  @media (max-width: 900px) {
    .title-card {
      padding: 14px 24px 10px;
    }
    .title-card .fighter-name {
      font-size: 26px;
      letter-spacing: 2px;
    }
    .title-card .fighter-logo {
      height: 32px;
    }
    .day-counter {
      font-size: 36px;
      padding: 6px 16px;
    }
    .what-is-this {
      top: 84px;
    }
  }
  /* Mobile */
  @media (max-width: 600px) {
    .title-card {
      top: 0;
      padding: 8px 16px;
    }
    .day-counter {
      top: 30%;
      transform: translate(-50%, -50%);
      font-size: 50px;
      z-index: 0;
      opacity: 0.8;
    }
    .title-card .fighter-name {
      font-size: 26px;
      letter-spacing: 1px;
    }
    .title-card .fighter-logo {
      height: 30px;
    }
    .title-card .fighter {
      gap: 6px;
    }
    .what-is-this {
      position: static;
      transform: none;
      font-size: 14px;
      text-align: center;
      padding: 0 0 16px;
    }
    .robot-parts {
      height: 70vh;
    }
    .robot-wrap {
      margin-top: 44px;
    }
    .robot-wrap.red { margin-right: -90px; }
    .robot-wrap.blue { margin-left: -90px; }
    .arena {
      align-items: flex-start;
      height: 75vh;
    }
    .testimonials {
      margin-top: 0;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

</body>
