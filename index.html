<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Boxing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  .arena {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .robot-wrap {
    position: absolute;
    display: flex;
    align-items: center;
  }
  .robot-wrap.blue { right: 50%; margin-right: 20px; }
  .robot-wrap.red { left: 50%; margin-left: 20px; }
  .robot-parts {
    position: relative;
    height: 95vh;
    aspect-ratio: 1;
  }
  .red .robot-parts {
    transform: scaleX(-1);
  }
  .robot-part {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .back-part {
    transform: translate(10px, -6px);
  }
  .red .back-part {
    transform: translate(10px, -6px);
  }
  /* Punch pivot joints */
  .shoulder-pivot, .elbow-pivot {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .shoulder-pivot {
    transform-origin: 52.1% 23.2%;
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .elbow-pivot {
    transform-origin: 53.9% 39.4%;
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .punching .shoulder-pivot {
    transform: rotate(90deg);
    transition: transform 0.21s ease-out;
  }
  .punching .elbow-pivot {
    transform: rotate(-63deg);
    transition: transform 0.21s ease-out;
  }
  .holding .shoulder-pivot {
    transform: rotate(90deg);
    transition: none;
  }
  .holding .elbow-pivot {
    transform: rotate(-63deg);
    transition: none;
  }
  .retracting .shoulder-pivot {
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .retracting .elbow-pivot {
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .hud {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-family: monospace;
    font-size: 14px;
    text-align: center;
    opacity: 0.7;
  }
  .hud div { margin: 4px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
