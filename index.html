<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Boxing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root {
    width: 100%;
    min-height: 100%;
    background: #000;
  }
  .arena {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .robot-wrap {
    position: absolute;
    display: flex;
    align-items: center;
  }
  .robot-wrap.red { right: 50%; margin-right: -160px; z-index: 0; }
  .robot-wrap.blue { left: 50%; margin-left: -160px; z-index: 0; }
  .robot-wrap.punching-wrap { z-index: 1; }
  .robot-parts {
    position: relative;
    height: 95vh;
    aspect-ratio: 1;
  }
  .blue .robot-parts {
    transform: scaleX(-1);
  }
  .robot-part {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .back-part {
    transform: translate(10px, -6px);
  }
  .blue .back-part {
    transform: translate(10px, -6px);
  }
  /* Punch pivot joints */
  .shoulder-pivot, .elbow-pivot {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .shoulder-pivot {
    transform-origin: 52.1% 23.2%;
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .elbow-pivot {
    transform-origin: 53.9% 39.4%;
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .punching .shoulder-pivot {
    transform: rotate(90deg);
    transition: transform 0.21s ease-out;
  }
  .punching .elbow-pivot {
    transform: rotate(-63deg);
    transition: transform 0.21s ease-out;
  }
  .holding .shoulder-pivot, .critHolding .shoulder-pivot {
    transform: rotate(90deg);
    transition: none;
  }
  .holding .elbow-pivot, .critHolding .elbow-pivot {
    transform: rotate(-63deg);
    transition: none;
  }
  .retracting .shoulder-pivot {
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .retracting .elbow-pivot {
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  /* Crit: slower fist retract to match head */
  .crit-retracting .shoulder-pivot {
    transform: rotate(0deg);
    transition: transform 0.4s ease-in;
  }
  .crit-retracting .elbow-pivot {
    transform: rotate(0deg);
    transition: transform 0.4s ease-in;
  }
  /* Head hit reaction — starts at holding (after fist lands) */
  .head {
    transition: transform 0.15s ease-in;
  }
  .hit-punching .head {
    transform: translateY(0);
  }
  .hit-holding .head {
    transform: translateY(-3%);
    transition: transform 0.1s ease-out 0.02s;
  }
  .hit-retracting .head {
    transform: translateY(0);
    transition: transform 0.2s ease-in;
  }
  .hit-crit.hit-retracting .head {
    transform: translateY(0);
    transition: transform 0.4s ease-in;
  }
  /* Crit head reaction — staccato ratchet upward, then smooth return */
  @keyframes crit-head-bob {
    0%   { transform: translateY(0); }
    8%   { transform: translateY(-2%); }
    14%  { transform: translateY(-1%); }
    22%  { transform: translateY(-4%); }
    28%  { transform: translateY(-3%); }
    36%  { transform: translateY(-6%); }
    42%  { transform: translateY(-5%); }
    50%  { transform: translateY(-8%); }
    56%  { transform: translateY(-7%); }
    64%  { transform: translateY(-10%); }
    100% { transform: translateY(-10%); }
  }
  .hit-crit.hit-holding .head {
    animation: crit-head-bob 0.8s ease-out forwards;
  }
  .hit-crit.hit-critHolding .head {
    transform: translateY(-10%);
    transition: none;
  }
  @keyframes pulse-orange {
    0%, 100% { opacity: 1; text-shadow: 0 0 16px rgba(255,102,0,0.5), 0 0 40px rgba(255,102,0,0.15); }
    50% { opacity: 0.6; text-shadow: 0 0 8px rgba(255,102,0,0.3), 0 0 20px rgba(255,102,0,0.1); }
  }
  /* Boxing Match Title Card */
  .title-card {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 60px 16px;
    pointer-events: none;
  }
  .title-card .fighter {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .title-card .fighter-logo {
    width: 52px;
    height: 52px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.25));
  }
  .day-counter {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 0;
    font-family: Impact, 'Arial Black', Haettenschweiler, sans-serif;
    font-size: 48px;
    color: #ff6600;
    text-align: center;
    line-height: 1;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 16px rgba(255,102,0,0.5), 0 0 40px rgba(255,102,0,0.15), 0 2px 4px rgba(0,0,0,0.9);
    border: 4px solid #ff6600;
    animation: pulse-orange 2s ease-in-out infinite;
    padding: 8px 20px;
  }
  .title-card .fighter-name {
    font-family: Impact, 'Arial Black', Haettenschweiler, sans-serif;
    font-size: 38px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    line-height: 1;
  }
  .title-card .fighter-name {
    color: #ffd700;
    text-shadow: 0 0 12px rgba(255,215,0,0.5), 0 0 30px rgba(255,215,0,0.2);
  }
  /* Testimonials — 8-bit speech bubbles */
  .testimonials {
    max-width: 700px;
    margin: -60px auto 0;
    position: relative;
    z-index: 5;
    padding: 0 20px 40px;
  }
  .testimonial-card {
    position: relative;
    background: #fff;
    color: #000;
    padding: 14px 18px;
    margin-bottom: 24px;
    image-rendering: pixelated;
    border: 4px solid #000;
    box-shadow:
      4px 0 0 0 #000,
      -4px 0 0 0 #000,
      0 4px 0 0 #000,
      0 -4px 0 0 #000;
  }
  .testimonial-card::after {
    content: "";
    position: absolute;
    bottom: -16px;
    left: 30px;
    width: 0;
    height: 0;
    border: 8px solid transparent;
    border-top: 8px solid #000;
  }
  .testimonial-card::before {
    content: "";
    position: absolute;
    bottom: -10px;
    left: 32px;
    width: 0;
    height: 0;
    border: 6px solid transparent;
    border-top: 6px solid #fff;
    z-index: 1;
  }
  .testimonial-card p {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.5;
    text-align: left;
    margin: 0;
    white-space: pre-line;
    color: #000;
    font-weight: bold;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
