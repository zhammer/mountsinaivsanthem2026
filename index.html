<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Boxing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  .arena {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .robot-wrap {
    position: absolute;
    display: flex;
    align-items: center;
  }
  .robot-wrap.blue { right: 50%; margin-right: -160px; z-index: 0; }
  .robot-wrap.red { left: 50%; margin-left: -160px; z-index: 0; }
  .robot-wrap.punching-wrap { z-index: 1; }
  .robot-parts {
    position: relative;
    height: 95vh;
    aspect-ratio: 1;
  }
  .red .robot-parts {
    transform: scaleX(-1);
  }
  .robot-part {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .back-part {
    transform: translate(10px, -6px);
  }
  .red .back-part {
    transform: translate(10px, -6px);
  }
  /* Punch pivot joints */
  .shoulder-pivot, .elbow-pivot {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .shoulder-pivot {
    transform-origin: 52.1% 23.2%;
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .elbow-pivot {
    transform-origin: 53.9% 39.4%;
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .punching .shoulder-pivot {
    transform: rotate(90deg);
    transition: transform 0.21s ease-out;
  }
  .punching .elbow-pivot {
    transform: rotate(-63deg);
    transition: transform 0.21s ease-out;
  }
  .holding .shoulder-pivot, .critHolding .shoulder-pivot {
    transform: rotate(90deg);
    transition: none;
  }
  .holding .elbow-pivot, .critHolding .elbow-pivot {
    transform: rotate(-63deg);
    transition: none;
  }
  .retracting .shoulder-pivot {
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  .retracting .elbow-pivot {
    transform: rotate(0deg);
    transition: transform 0.2s ease-in;
  }
  /* Crit: slower fist retract to match head */
  .crit-retracting .shoulder-pivot {
    transform: rotate(0deg);
    transition: transform 0.4s ease-in;
  }
  .crit-retracting .elbow-pivot {
    transform: rotate(0deg);
    transition: transform 0.4s ease-in;
  }
  /* Head hit reaction — starts at holding (after fist lands) */
  .head {
    transition: transform 0.15s ease-in;
  }
  .hit-punching .head {
    transform: translateY(0);
  }
  .hit-holding .head {
    transform: translateY(-3%);
    transition: transform 0.1s ease-out 0.02s;
  }
  .hit-retracting .head {
    transform: translateY(0);
    transition: transform 0.2s ease-in;
  }
  .hit-crit.hit-retracting .head {
    transform: translateY(0);
    transition: transform 0.4s ease-in;
  }
  /* Crit head reaction — staccato ratchet upward, then smooth return */
  @keyframes crit-head-bob {
    0%   { transform: translateY(0); }
    8%   { transform: translateY(-2%); }
    14%  { transform: translateY(-1%); }
    22%  { transform: translateY(-4%); }
    28%  { transform: translateY(-3%); }
    36%  { transform: translateY(-6%); }
    42%  { transform: translateY(-5%); }
    50%  { transform: translateY(-8%); }
    56%  { transform: translateY(-7%); }
    64%  { transform: translateY(-10%); }
    100% { transform: translateY(-10%); }
  }
  .hit-crit.hit-holding .head {
    animation: crit-head-bob 0.8s ease-out forwards;
  }
  .hit-crit.hit-critHolding .head {
    transform: translateY(-10%);
    transition: none;
  }
  .hud {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-family: monospace;
    font-size: 14px;
    text-align: center;
    opacity: 0.7;
  }
  .hud div { margin: 4px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
